syntax = "proto3";

package tickets;

service TicketService {
  rpc GenerarTicket (TicketRequest) returns (TicketResponse);
}

message TicketRequest {
  string cliente = 1;
}

// Lo que el Microservicio devuelve al Web Server (Con la telemetría agregada)
message TicketResponse {
  bool ok = 1;
  int32 ticketNumero = 2;
  string procesadoPor = 3;
  string mensaje = 4;
  int32 usoCpu = 5;
  int32 usoRam = 6;
  int32 numProcesos = 7;
}